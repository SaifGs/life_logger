<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Life Logger</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <h1>life.log</h1>
      <button id="btn-settings" title="Einstellungen">⚙</button>
    </header>

    <!-- Record Section -->
    <section id="record-section">
      <button id="btn-record" aria-label="Aufnahme starten">
        <span class="mic-icon">🎙</span>
        <span class="pulse-ring"></span>
      </button>
      <p id="record-status">Tippen zum Aufnehmen</p>
      <div id="live-transcript"></div>
    </section>

    <!-- Log Section -->
    <section id="log-section">
      <div id="log-entries"></div>
    </section>

    <!-- Sync Status -->
    <div id="sync-status"></div>

  </div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal hidden">
    <div class="modal-box">
      <h2>Einstellungen</h2>
      <label>GitHub Username
        <input type="text" id="gh-user" placeholder="dein-username" />
      </label>
      <label>Private Repo Name
        <input type="text" id="gh-repo" placeholder="my-history" />
      </label>
      <label>Personal Access Token
        <input type="password" id="gh-token" placeholder="ghp_..." />
      </label>
      <label>OpenAI API Key
        <input type="password" id="openai-key" placeholder="sk-..." />
      </label>
      <div class="modal-actions">
        <button id="btn-save-settings">Speichern</button>
        <button id="btn-close-settings" class="secondary">Abbrechen</button>
        <button id="btn-export" class="secondary">📥 Export .log</button>
      </div>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/github.js"></script>
  <script src="js/whisper.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
