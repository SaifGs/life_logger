<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>life.log</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Setup Screen -->
  <div id="screen-setup" class="screen hidden">
    <div class="setup-inner">
      <h1>life.log</h1>
      <p class="tagline">Sprich. Alles wird gespeichert.</p>

      <div class="setup-group">
        <span class="group-label">OpenAI</span>
        <input type="password" id="openai-key" placeholder="sk-..." autocomplete="off" spellcheck="false" />
      </div>

      <div class="setup-group">
        <span class="group-label">GitHub</span>
        <input type="text"     id="gh-user"  placeholder="username"          autocomplete="off" spellcheck="false" />
        <input type="text"     id="gh-repo"  placeholder="repo-name (privat)" autocomplete="off" spellcheck="false" />
        <input type="password" id="gh-token" placeholder="ghp_..."            autocomplete="off" spellcheck="false" />
      </div>

      <button id="btn-start">Loslegen</button>
    </div>
  </div>

  <!-- Main Screen -->
  <div id="screen-main" class="screen hidden">

    <header>
      <span class="logo" id="btn-to-setup" title="Einstellungen">life.log</span>
    </header>

    <section id="record-section">
      <button id="btn-record" aria-label="Aufnahme starten">
        <span class="mic-icon">🎙</span>
        <span class="pulse-ring"></span>
      </button>
      <p id="record-status">Tippen zum Aufnehmen</p>
      <div id="live-transcript"></div>
    </section>

    <section id="log-section">
      <div id="log-entries"></div>
    </section>

    <div id="sync-status"></div>
  </div>

  <script src="js/github.js"></script>
  <script src="js/whisper.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
